# =====================================================================
#  PERFIL: RENDER (produção no Render.com)
#  Banco: Supabase via Connection Pooler (Supavisor)
# =====================================================================

spring.application.name=aclp

# -------------- SERVIDOR --------------
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# -------------- DATASOURCE --------------
# Aceita tanto SPRING_DATASOURCE_* quanto DATABASE_* (compatibilidade)
# IMPORTANTE: para Supabase Pooler, username DEVE ser 'postgres.<project-ref>'
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------- HIKARI POOL --------------
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=120000
# Não bloquear o boot indefinidamente se o DB estiver fora:
# 0  = falha rápida (boot aborta imediatamente se o DB não responde)
# -1 = boot mesmo sem DB (lazy connect — pode ser útil em cold starts)
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.pool-name=ACLP-Render-Pool
spring.datasource.hikari.auto-commit=true

spring.datasource.hikari.data-source-properties.socketTimeout=30
spring.datasource.hikari.data-source-properties.loginTimeout=10
spring.datasource.hikari.data-source-properties.connectTimeout=10
spring.datasource.hikari.data-source-properties.tcpKeepAlive=true
spring.datasource.hikari.data-source-properties.ApplicationName=ACLP-Render
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
# prepareThreshold=0 é exigido pelo pooler do Supabase em modo Transaction
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048

# -------------- JPA / HIBERNATE --------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bahia
# REMOVIDO: spring.jpa.properties.hibernate.dialect=...
# O Hibernate detecta o dialeto sozinho — definir manualmente gera WARN HHH90000025
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

spring.datasource.sql-script-encoding=UTF-8
spring.transaction.default-timeout=30

# -------------- REDIS (desabilitado no Render) --------------
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
aclp.redis.enabled=false

# -------------- JWT --------------
aclp.jwt.secret=${JWT_SECRET}
aclp.jwt.expiration-ms=86400000
aclp.jwt.refresh-expiration-ms=604800000
aclp.jwt.issuer=ACLP-TJBA-Render

# -------------- FRONTEND / CORS --------------
aclp.frontend.url=${ACLP_FRONTEND_URL:http://localhost:3000}
aclp.cors.allowed-origins=${ACLP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# -------------- E-MAIL --------------
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.3,TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

aclp.email.enabled=${ACLP_EMAIL_ENABLED:false}
aclp.email.remetente=TJBA - Sistema ACLP <${MAIL_USERNAME:noreply@aclp.com}>

# -------------- FORMATAÇÃO DE DATAS --------------
aclp.time.format=HH:mm:ss
aclp.date.format=yyyy-MM-dd
aclp.datetime.format=yyyy-MM-dd'T'HH:mm:ss

spring.jackson.date-format=yyyy-MM-dd
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-dates-with-zone-id=false
spring.jackson.time-zone=America/Sao_Paulo

# -------------- SWAGGER --------------
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=br.jus.tjba.aclp.controller
springdoc.paths-to-match=/api/**

spring.h2.console.enabled=false

# -------------- VERIFICACAO E SEGURANCA --------------
aclp.verificacao.codigo.validade-minutos=10
aclp.verificacao.codigo.max-tentativas=5
aclp.verificacao.rate-limit.max-por-ip-hora=10
aclp.verificacao.rate-limit.max-por-email-hora=3
aclp.verificacao.token.validade-minutos=30
aclp.verificacao.codigo.length=6
aclp.verificacao.limpeza.enabled=true

aclp.security.password.expiration-days=320
aclp.security.max-login-attempts=10
aclp.security.lockout-duration-minutes=5

aclp.admin.bootstrap.enabled=false

# -------------- SELF-PING (acordar Render free tier) --------------
aclp.self-ping.enabled=${ACLP_SELF_PING_ENABLED:true}
aclp.self-ping.url=${ACLP_SELF_PING_URL:}

# -------------- TASK EXECUTOR --------------
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=3
spring.task.execution.pool.queue-capacity=50
spring.task.execution.thread-name-prefix=async-

# -------------- LOGGING --------------
logging.level.root=WARN
logging.level.br.jus.tjba.aclp=INFO
logging.level.br.jus.tjba.aclp.config.DataSourceHealthValidator=INFO
logging.level.br.jus.tjba.aclp.config.DataSourceConfigChecker=INFO
logging.level.br.jus.tjba.aclp.scheduler=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari=INFO

# -------------- ACTUATOR --------------
# health/db é exposto para que você consiga monitorar o estado do banco
# sem precisar fazer login na aplicação.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
